<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State & Event Handlers</title>
</head>
<body>
    <div class="container"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js""></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        function ClickCounts({clickCounts, setClickCounts}) {
            function click() {
                setClickCounts(clickCounts + 1);
            }

            return (
                <>
                    <button 
                        onClick={click}
                        >Clicked {clickCounts} {clickCounts === 1 ? 'time' : 'times'}
                    </button>
                </>
            );
        }

        function App() {
            const [clickCounts, setClickCounts] = React.useState(0);

            function reset() {
                setClickCounts(0);
            }

            return (
                <>
                    <ClickCounts 
                        clickCounts={clickCounts} 
                        setClickCounts={setClickCounts}
                    />
                    <ClickCounts 
                        clickCounts={clickCounts} 
                        setClickCounts={setClickCounts}
                    />
                    <button onClick={reset}>Reset</button>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.querySelector(".container"));
        root.render(<App />);
    </script>
</body>
</html>
