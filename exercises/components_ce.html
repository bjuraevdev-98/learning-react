<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Exercises</title>
</head>
<body>
    <div class="container"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        function ProductDetails({ product, price, discountPrice, imageSrc }) {
            return (
                <div style={{ margin: '0 0 10px 0' }}>
                    <div>
                        <img src={ imageSrc } width='100'/>
                    </div>
                    <p>{ product }</p>
                    {discountPrice ? (
                        <>
                            <del>
                                <p>Price: ${ price }</p>
                            </del>
                            <p>Discount Price: ${ discountPrice }</p>
                        </>
                        ) : (
                            <p>Price: ${ price }</p>
                        )
                    }
                    <button>Add to Cart</button>
                </div>
            );
        }

        function App() {
            return (
                <>
                    <ProductDetails 
                        imageSrc="cotton-socks.png"
                        product="Cotton Socks" 
                        price="10.90"
                        discountPrice="5.45"
                    />
                    <ProductDetails 
                        imageSrc="tennis-balls.png"
                        product="Tennis Balls" 
                        price="6.00" 
                    />
                    <ProductDetails 
                        imageSrc="plain-t-shirt.png"
                        product="Plain T-Shirt" 
                        price="7.99" 
                    />
                </>
            );
                
        }

        const root = ReactDOM.createRoot(document.querySelector('.container'));
        root.render(<App />);
    </script>
</body>
</html>
